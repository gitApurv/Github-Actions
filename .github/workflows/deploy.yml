name: Deploy Project Workflow
on: push
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Get Code
        uses: actions/checkout@v5
      - name: Install NodeJs
        uses: actions/setup-node@v5
        with:
          node-version: latest
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test
  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Get Code
        uses: actions/checkout@v5
      - name: Install NodeJs
        uses: actions/setup-node@v5
        with:
          node-version: latest
      - name: Install dependencies
        run: npm ci
      - name: Build App
        run: npm run build
      - name: Deploy App
        run: echo "Simulating deployment"
